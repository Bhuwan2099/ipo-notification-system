name: Daily IPO Alert
on:
  schedule:
    - cron: '0 0 * * *' # This is 9:00 AM Korea Time
  workflow_dispatch: # This adds a "Run" button for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openai python-dotenv

      - name: Run IPO Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SENDER: "bhuwan36ch23@gmail.com"
        run: python ipo_tracker.py
